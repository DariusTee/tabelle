name: Update Bundesliga Tabelle

on:
  schedule:
    - cron: "0 * * * *"  # jede Stunde
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js installieren
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Abhängigkeiten installieren
        run: npm install puppeteer

      - name: Tabelle aktualisieren
        run: node scripts/updateAllLigen.js

      - name: Änderungen committen
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/bundesliga.json
          git commit -m "Update Bundesliga Tabelle" || echo "no changes"
          git push
