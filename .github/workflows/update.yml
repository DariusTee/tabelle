name: Update Tabellen

on:
  schedule:
    - cron: "0 * * * *"   # jede volle Stunde
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Repository auschecken
      - uses: actions/checkout@v4

      # Node installieren
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Abhängigkeiten installieren
      - run: npm install

      # Tabellen scrapen
      - name: Scrape Tabellen
        run: node scripts/updateData.js

      # Änderungen committen und pushen mit GitHub Token
      - name: Commit & Push updated tables
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data
          git commit -m "update tables" || echo "no changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
