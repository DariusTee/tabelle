name: Update Tabellen

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Scrape Tabellen
        run: node scripts/updateData.js

      - name: Commit & Push updated tables
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data
          git commit -m "update tables" || echo "no changes"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
