name: Update Spielplan

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: update-spielplan-main
  cancel-in-progress: false

jobs:
  update-games:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Git konfigurieren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Aktuellen Stand holen
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase origin main

      - name: xml2js temporär installieren
        run: npm install --no-save --no-package-lock xml2js

      - name: Spielplan aktualisieren
        run: node scripts/updateGames.js

      - name: Änderungen committen
        run: |
          git add public/data/*.json
          git diff --cached --quiet && echo "Keine Änderungen" || git commit -m "Update Spieltage $(date +'%Y-%m-%d')"

      - name: Vor Push erneut synchronisieren
        run: |
          git fetch origin main
          git pull --rebase origin main

      - name: Änderungen pushen
        run: git push origin main
