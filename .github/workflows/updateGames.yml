name: Update Spielplan

on:
  schedule:
    # Läuft jeden Tag um 02:00 Uhr UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-games:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Abhängigkeiten installieren
        run: npm install xml2js

      - name: Spielplan aktualisieren
        run: node scripts/updateGames.js

      - name: Git konfigurieren
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Änderungen committen
        run: |
          git add public/data/*.json
          git commit -m "Update Spieltage $(date +'%Y-%m-%d')" || echo "Keine Änderungen"

      - name: Änderungen pushen
        run: git push
